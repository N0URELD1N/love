<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
}

/* القلوب */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}

/* الصفحة الأولى */
#page1 {
  position: relative;
  width: 100%;
  height: 100vh;
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,255,255,0.7);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* الصفحة الثانية */
#page2 {
  display: none;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: radial-gradient(circle, #ff4d6d, #800020);
}

.love-text {
  font-size: 50px;
  color: white;
  text-align: center;
  animation: moveText 2s infinite alternate ease-in-out;
  text-shadow: 0 0 20px #fff, 0 0 40px #ff99ac;
}

@keyframes moveText {
  0% { transform: scale(1) translateY(0); }
  100% { transform: scale(1.2) translateY(-20px); }
}
</style>

</head>
<body>

<!-- الصفحة الأولى -->
<div id="page1">
  <div class="center">
    <button onclick="goLove()">اضغط هنا ❤️</button>
  </div>
</div>

<!-- الصفحة الثانية -->
<div id="page2">
  <div class="love-text">
    I LOVE YOU DANA ❤️
  </div>
</div>

<!-- الصوت -->
<audio id="music" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
// إنشاء القلوب
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 200);

// عند الضغط
function goLove() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";

  // تشغيل الأغنية
  document.getElementById("music").play();
}
</script>

</body>
</html>
